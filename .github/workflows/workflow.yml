name: GEL IPTV Media Analyzer Build

on:

  push:
    branches:
      - '**'

  pull_request:
    branches:
      - '**'

  workflow_dispatch:

jobs:

  build:

    name: Build Debug APK + Release AAB

    runs-on: ubuntu-latest

    steps:

      # -------------------------------------------------
      # CHECKOUT
      # -------------------------------------------------
      - name: Checkout source
        uses: actions/checkout@v4

      # -------------------------------------------------
      # JAVA 17
      # -------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # -------------------------------------------------
      # GRADLE CACHE
      # -------------------------------------------------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper

          key: >
            gradle-${{ runner.os }}-
            ${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

          restore-keys: |
            gradle-${{ runner.os }}-

      # -------------------------------------------------
      # GRADLE EXECUTION PERMISSION
      # -------------------------------------------------
      - name: Grant execute permission
        run: chmod +x gradlew

      # -------------------------------------------------
      # CLEAN
      # -------------------------------------------------
      - name: Clean project
        run: ./gradlew clean --stacktrace

      # -------------------------------------------------
      # BUILD DEBUG APK
      # -------------------------------------------------
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # -------------------------------------------------
      # BUILD RELEASE AAB
      # -------------------------------------------------
      - name: Build Release AAB
        run: ./gradlew bundleRelease --stacktrace

      # -------------------------------------------------
      # UPLOAD DEBUG APK
      # -------------------------------------------------
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GEL-IPTV-Media-Analyzer-debug-apk

          path: |
            **/build/outputs/apk/debug/*.apk

      # -------------------------------------------------
      # UPLOAD RELEASE AAB
      # -------------------------------------------------
      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: GEL-IPTV-Media-Analyzer-release-aab

          path: |
            **/build/outputs/bundle/release/*.aab
