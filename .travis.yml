language: android

dist: jammy

android:
  components:
    - platform-tools
    - build-tools-34.0.0
    - android-34

jdk:
  - openjdk17

cache:
  directories:
    - $HOME/.gradle/caches
    - $HOME/.gradle/wrapper

before_script:
  - chmod +x ./deploy_snapshot.sh
  - chmod +x ./travis/push-artifact.sh
  - chmod +x ./gradlew

script:
  - ./gradlew clean
  - ./gradlew Snooper:testDebugUnitTest
  - ./gradlew Snooper:lintDebug
  - ./gradlew Snooper-Spring:testDebugUnitTest
  - ./gradlew Snooper-Spring:lintDebug
  - ./gradlew Snooper-Okhttp:testDebugUnitTest
  - ./gradlew Snooper-Okhttp:lintDebug

after_success:
  - ./deploy_snapshot.sh

env:
  global:
    - GRADLE_OPTS="-Xmx2g -Dkotlin.daemon.jvm.options=-Xmx2g"
